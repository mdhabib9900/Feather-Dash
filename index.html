/* ====== SETTINGS PANEL ====== */
.settings-panel {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) scale(0.9);
  width: 300px;
  background: #0d1117;
  border: 2px solid #30363d;

  transform: translate(-50%, -50%) scale(1);
}

  state="play";flash=5;deadTick=0;
}

function checkButtonClick(mx,my){
  var gearX=W-35,gearY=FLOOR-25;
  if(state==="start"&&!settingsOpen){
    if(mx>gearX-20&&mx<gearX+20&&my>gearY-20&&my<gearY+20){settingsPanel.classList.add('visible');settingsOpen=true;sfxClick();return true;}
    var btnW=160,btnH=50,btnX=(W-btnW)/2,btnY=330;
    if(mx>btnX&&mx<btnX+btnW&&my>btnY&&my<btnY+btnH){startGame();return true;}
  }
  if(settingsOpen){var pw=280,ph=260,px=(W-pw)/2,py=130;if(mx>px+pw-35&&mx<px+pw-10&&my>py+8&&my<py+32){settingsPanel.classList.remove('visible');settingsOpen=false;sfxClick();return true;}return true;}

  return false;

function getTargetBiome(sc){for(var i=biomeChangePoints.length-1;i>=0;i--){if(sc>=biomeChangePoints[i])return Math.min(i+1,biomes.length-1);}return 0;}

function updDiff(){
  difficulty=Math.min(score/diffSettings.diffScale,1);
  speed=diffSettings.baseSpeed+(diffSettings.maxSpeed-diffSettings.baseSpeed)*difficulty;
  pipeGap=diffSettings.baseGap-(diffSettings.baseGap-diffSettings.minGap)*difficulty*0.6;
  spawnRate=Math.max(diffSettings.spawnMin,Math.floor(diffSettings.spawnBase-(diffSettings.spawnBase-diffSettings.spawnMin)*difficulty));
  var newTarget=getTargetBiome(score);if(newTarget!==targetBiome)targetBiome=newTarget;

function addPipe(){
  var mn=70,mx=FLOOR-pipeGap-70,range=mx-mn;
  var top=mn+range*0.2+Math.random()*(range*0.6);
  var mvChance=currentDiff==="easy"?0.15:currentDiff==="normal"?0.25:0.35;
  var mvStart=currentDiff==="easy"?15:currentDiff==="normal"?12:8;
  var mv=(score>=mvStart&&Math.random()<mvChance)?((Math.random()-0.5)*(currentDiff==="hard"?1:0.7)):0;
  pipes.push({x:W+20,top:top,oTop:top,sc:false,mvy:mv,mt:Math.random()*100});
}

function update(){
  tick++;dayTime+=daySpeed;if(dayTime>=1)dayTime=0;
  for(var i=0;i<clouds.length;i++){clouds[i].x-=clouds[i].speed;if(clouds[i].x<-80){clouds[i].x=W+50+Math.random()*50;clouds[i].y=50+Math.random()*100;}}
  var stormActive=(currentBiome===11||targetBiome===11);
  if(lightning>0)lightning--;if(stormActive&&Math.random()<0.003)lightning=10;
  if(shakeT>0){shakeT--;shakeX=(Math.random()-0.5)*shakeT*0.7;shakeY=(Math.random()-0.5)*shakeT*0.7;}else{shakeX=0;shakeY=0;}
  if(flash>0)flash--;if(scoreAnim>0)scoreAnim--;
  for(var i=particles.length-1;i>=0;i--){var p=particles[i];p.x+=p.vx;p.y+=p.vy;p.vy+=p.g;p.vx*=0.97;p.life--;if(p.life<=0)particles.splice(i,1);}
  for(var i=floats.length-1;i>=0;i--){var f=floats[i];f.y+=f.vy;f.life--;if(f.life<=0)floats.splice(i,1);}
  if(state==="start"){bird.y=250+Math.sin(tick*0.05)*14;bird.at+=0.12;bird.wingPos=Math.sin(tick*0.3)*0.5+0.5;bird.fr=Math.floor(bird.at)%3;bird.rot=0;bird.dead=false;return;}
  if(state==="fall"){bird.dead=true;bird.vy+=diffSettings.gravity*1.2;if(bird.vy>diffSettings.maxVel)bird.vy=diffSettings.maxVel;bird.y+=bird.vy;bird.rot=Math.min(bird.rot+4,75);if(bird.y>=FLOOR-BIRDR){bird.y=FLOOR-BIRDR;state="dead";sfxDie();deadTick=0;if(score>best[currentDiff]){best[currentDiff]=score;saveBest();}}return;}
  if(state==="dead"){bird.dead=true;deadTick++;return;}
  if(paused)return;
  if(currentBiome!==targetBiome){biomeBlend+=0.003;if(biomeBlend>=1){currentBiome=targetBiome;biomeBlend=0;for(var i=0;i<bgElements.length;i++)bgElements[i].biome=targetBiome;}}
  groundX=(groundX-speed)%48;
  for(var i=0;i<bgElements.length;i++){bgElements[i].x-=speed*0.3;if(bgElements[i].x<-80){bgElements[i].x=W+50+Math.random()*80;bgElements[i].type=Math.floor(Math.random()*5);bgElements[i].h=30+Math.random()*50;bgElements[i].biome=targetBiome;}}
  bird.dead=false;bird.vy+=diffSettings.gravity;if(bird.vy>diffSettings.maxVel)bird.vy=diffSettings.maxVel;bird.y+=bird.vy;bird.at+=0.18;bird.wingPos=Math.sin(tick*0.5)*0.5+0.5;bird.fr=Math.floor(bird.at)%3;
  if(bird.vy<-2)bird.rot=-12;else if(bird.vy>2)bird.rot=18;else bird.rot=bird.vy*3;
  if(tick%spawnRate===0)addPipe();
  for(var i=pipes.length-1;i>=0;i--){
    var p=pipes[i];p.x-=speed;
    if(p.mvy!==0){p.mt+=0.03;p.top=p.oTop+Math.sin(p.mt)*22;}
    if(!p.sc&&p.x+54<BIRDX){p.sc=true;score++;combo++;updDiff();scoreAnim=12;if(combo>1&&combo%5===0){sfxCombo();addFloat("COMBO x"+combo+"!",BIRDX+20,bird.y-30,"#FF6B6B",18);emit(BIRDX,bird.y,8,"#FF6B6B",1.2);}else{sfxScore();addFloat("+1",BIRDX+25,bird.y-25,"#FFD700",16);}emit(BIRDX,bird.y-12,4,"#FFD700");}
    if(p.x<-64){pipes.splice(i,1);continue;}
    if(BIRDX+BIRDR-2>p.x&&BIRDX-BIRDR+2<p.x+54){if(bird.y-BIRDR+2<p.top||bird.y+BIRDR-2>p.top+pipeGap){sfxHit();flash=8;shakeT=10;combo=0;emit(BIRDX,bird.y,12,"#e74c3c",1.3);bird.dead=true;state="fall";return;}}
  }
  if(bird.y+BIRDR>=FLOOR){bird.y=FLOOR-BIRDR;sfxHit();flash=8;shakeT=6;combo=0;bird.dead=true;state="dead";sfxDie();deadTick=0;if(score>best[currentDiff]){best[currentDiff]=score;saveBest();}}
  if(bird.y-BIRDR<0){bird.y=BIRDR;bird.vy=0;}
}

function lerpA(a,b,t){return[Math.round(a[0]+(b[0]-a[0])*t),Math.round(a[1]+(b[1]-a[1])*t),Math.round(a[2]+(b[2]-a[2])*t)];}

  x.fillStyle="#f8c53a";x.beginPath();x.ellipse(0,0,12,11,0,0,Math.PI*2);x.fill();x.strokeStyle="#c48a1a";x.lineWidth=1.5;x.stroke();
  x.fillStyle="#fae48b";x.beginPath();x.ellipse(2,4,8,6,0.1,0,Math.PI*2);x.fill();
  var wingY=bird.dead?5:(tick%10<5)?-6:3;x.fillStyle="#e8a820";x.beginPath();x.ellipse(-3,wingY,9,5,-0.15,0,Math.PI*2);x.fill();x.strokeStyle="#b87e15";x.lineWidth=1;x.stroke();
  x.fillStyle="#fff";x.beginPath();x.arc(7,-4,5,0,Math.PI*2);x.fill();x.strokeStyle="#555";x.lineWidth=0.8;x.stroke();
  if(bird.dead){x.strokeStyle="#222";x.lineWidth=2;x.beginPath();x.moveTo(5,-5);x.lineTo(9,-1);x.moveTo(9,-5);x.lineTo(5,-1);x.stroke();}
  else{x.fillStyle="#222";x.beginPath();x.arc(9,-4,2.5,0,Math.PI*2);x.fill();x.fillStyle="#fff";x.beginPath();x.arc(10,-5,1,0,Math.PI*2);x.fill();}
  x.fillStyle="#f45c42";x.beginPath();x.moveTo(11,0);x.lineTo(21,3);x.lineTo(11,5);x.closePath();x.fill();x.fillStyle="#e04530";x.beginPath();x.moveTo(11,5);x.lineTo(18,4);x.lineTo(11,7);x.closePath();x.fill();
  x.restore();
}

function drawParticles(){for(var i=0;i<particles.length;i++){var p=particles[i];var a=p.life/p.max;x.globalAlpha=a;x.fillStyle=p.col;x.beginPath();x.arc(p.x,p.y,p.sz*a,0,Math.PI*2);x.fill();}x.globalAlpha=1;}
function drawFloats(){for(var i=0;i<floats.length;i++){var f=floats[i];var a=f.life/f.max;x.globalAlpha=a;x.font="bold "+f.sz+"px Arial";x.textAlign="center";x.lineWidth=2;x.strokeStyle="rgba(0,0,0,0.3)";x.fillStyle=f.col;x.strokeText(f.t,f.x,f.y);x.fillText(f.t,f.x,f.y);}x.globalAlpha=1;}

function drawScore(){
  if(state!=="play"||paused)return;
  var sc=1+(scoreAnim>0?scoreAnim*0.008:0);x.save();x.translate(W/2,50);x.scale(sc,sc);
  x.font="bold 46px Arial";x.textAlign="center";x.textBaseline="middle";x.lineWidth=4;x.strokeStyle="rgba(0,0,0,0.5)";x.fillStyle="#fff";x.strokeText(score,0,0);x.fillText(score,0,0);x.restore();
  x.font="11px Arial";x.textAlign="center";x.fillStyle="rgba(255,255,255,0.6)";
  var displayBiome=biomeBlend>0.5?biomes[targetBiome]:biomes[currentBiome];x.fillText(displayBiome.name,W/2,80);
  if(combo>=5){x.font="bold 14px Arial";x.fillStyle="#FF6B6B";x.strokeStyle="rgba(0,0,0,0.3)";x.lineWidth=2;x.strokeText("COMBO x"+combo,W/2,98);x.fillText("COMBO x"+combo,W/2,98);}
}

function drawSpeedBar(){if(state!=="play"||difficulty<0.05)return;var bw=60,bh=6,bx=W-bw-12,by=14;x.fillStyle="rgba(0,0,0,0.25)";x.fillRect(bx,by,bw,bh);var col=difficulty<0.4?"#39ff14":difficulty<0.7?"#ffcc00":"#ff3c5f";x.fillStyle=col;x.fillRect(bx,by,bw*difficulty,bh);x.strokeStyle="rgba(255,255,255,0.3)";x.lineWidth=1;x.strokeRect(bx,by,bw,bh);}

function rRect(rx,ry,rw,rh,rr){x.beginPath();x.moveTo(rx+rr,ry);x.lineTo(rx+rw-rr,ry);x.quadraticCurveTo(rx+rw,ry,rx+rw,ry+rr);x.lineTo(rx+rw,ry+rh-rr);x.quadraticCurveTo(rx+rw,ry+rh,rx+rw-rr,ry+rh);x.lineTo(rx+rr,ry+rh);x.quadraticCurveTo(rx,ry+rh,rx,ry+rh-rr);x.lineTo(rx,ry+rr);x.quadraticCurveTo(rx,ry,rx+rr,ry);x.closePath();}

function drawMenu(){
  x.fillStyle="rgba(0,0,0,0.18)";x.fillRect(0,0,W,FLOOR);
  var bob=Math.sin(tick*0.04)*6;
  x.save();x.translate(W/2,130+bob);
  x.font="bold 40px Arial";x.textAlign="center";x.textBaseline="middle";
  x.lineWidth=5;x.strokeStyle="#543e14";x.fillStyle="#fff";
  x.strokeText("Feather Dash",0,0);x.fillText("Feather Dash",0,0);
  x.font="bold 14px Arial";x.fillStyle="#FFD700";x.lineWidth=2;
  x.strokeText("PRO EDITION",0,26);x.fillText("PRO EDITION",0,26);
  x.restore();
  x.font="bold 14px Arial";x.textAlign="center";x.fillStyle=diffSettings.color;
  x.fillText("Mode: "+diffSettings.name,W/2,200);
  var btnW=160,btnH=50,btnX=(W-btnW)/2,btnY=330;
  var isHover=hoverBtn==="start";var pulse=Math.sin(tick*0.08)*3;
  x.fillStyle="rgba(0,0,0,0.3)";rRect(btnX+3,btnY+4,btnW,btnH,12);x.fill();
  var btnGrad=x.createLinearGradient(btnX,btnY,btnX,btnY+btnH);
  if(isHover){btnGrad.addColorStop(0,"#5dde5d");btnGrad.addColorStop(1,"#3cb043");}
  else{btnGrad.addColorStop(0,"#4CAF50");btnGrad.addColorStop(1,"#2e7d32");}
  rRect(btnX-pulse/2,btnY-pulse/2,btnW+pulse,btnH+pulse,12);x.fillStyle=btnGrad;x.fill();x.strokeStyle="#1b5e20";x.lineWidth=3;x.stroke();
  x.font="bold 24px Arial";x.textAlign="center";x.textBaseline="middle";x.fillStyle="#fff";
  x.shadowColor="rgba(0,0,0,0.3)";x.shadowBlur=4;x.shadowOffsetY=2;x.fillText("▶ START",W/2,btnY+btnH/2+1);x.shadowBlur=0;
  x.font="13px Arial";x.fillStyle="rgba(255,255,255,0.6)";x.fillText("or press SPACE",W/2,btnY+btnH+20);
  if(best[currentDiff]>0){x.font="16px Arial";x.fillStyle="#FFD700";x.fillText("Best: "+best[currentDiff],W/2,435);}
}

function drawStar(sx,sy,ir,or,pts){x.beginPath();for(var i=0;i<pts*2;i++){var r=i%2===0?or:ir;var a=i*Math.PI/pts-Math.PI/2;if(i===0)x.moveTo(sx+r*Math.cos(a),sy+r*Math.sin(a));else x.lineTo(sx+r*Math.cos(a),sy+r*Math.sin(a));}x.closePath();x.fill();}

function drawDead(){
  var fadeIn=Math.min(1,deadTick/20);
  x.globalAlpha=fadeIn*0.4;x.fillStyle="#000";x.fillRect(0,0,W,FLOOR);x.globalAlpha=1;
  var slideY=Math.max(0,(1-Math.min(1,deadTick/15))*-40);
  x.save();x.translate(0,slideY);x.globalAlpha=fadeIn;
  var pw=240,ph=reviveCount<3?280:210,px=(W-pw)/2,py=reviveCount<3?75:105;
  rRect(px,py,pw,ph,12);x.fillStyle="#deb887";x.fill();x.strokeStyle="#8B7332";x.lineWidth=3;x.stroke();
  rRect(px+10,py+40,pw-20,ph-50,8);x.fillStyle="#c4a265";x.fill();
  x.font="bold 26px Arial";x.textAlign="center";x.fillStyle="#5D4E37";x.fillText("Game Over!",W/2,py+26);
  x.font="bold 11px Arial";x.fillStyle=diffSettings.color;x.fillText(diffSettings.name.toUpperCase(),W/2,py+42);
  x.font="12px Arial";x.fillStyle="#666";var reachedBiome=biomeBlend>0.5?biomes[targetBiome]:biomes[currentBiome];x.fillText("Reached: "+reachedBiome.name,W/2,py+60);
  x.font="14px Arial";x.fillStyle="#5D4E37";x.fillText("Score",W/2+30,py+88);x.font="bold 28px Arial";x.fillText(score,W/2+30,py+116);x.font="14px Arial";x.fillText("Best",W/2+30,py+143);x.font="bold 28px Arial";x.fillText(best[currentDiff],W/2+30,py+171);
  if(score===best[currentDiff]&&score>0){x.font="bold 11px Arial";x.fillStyle="#e74c3c";x.fillText("NEW!",W/2+70,py+143);}
  var medal=null,thresholds=currentDiff==="easy"?[50,40,25,15]:currentDiff==="normal"?[40,30,20,10]:[30,20,12,6];
  if(score>=thresholds[0])medal={c:"#e5c100",b:"#b8960a",n:"Platinum"};else if(score>=thresholds[1])medal={c:"#FFD700",b:"#DAA520",n:"Gold"};else if(score>=thresholds[2])medal={c:"#C0C0C0",b:"#A0A0A0",n:"Silver"};else if(score>=thresholds[3])medal={c:"#CD7F32",b:"#A0522D",n:"Bronze"};
  if(medal){var mx=px+45,my=py+125;var glow=0.2+Math.sin(deadTick*0.08)*0.15;x.fillStyle="rgba(255,215,0,"+glow+")";x.beginPath();x.arc(mx,my,28,0,Math.PI*2);x.fill();x.beginPath();x.arc(mx,my,22,0,Math.PI*2);x.fillStyle=medal.c;x.fill();x.strokeStyle=medal.b;x.lineWidth=2;x.stroke();x.fillStyle="#fff";drawStar(mx,my,7,13,5);x.font="9px Arial";x.fillStyle="#5D4E37";x.fillText(medal.n,mx,my+33);}
  if(reviveCount<3&&deadTick>20){
    var btn=getReviveBtnPos();var isRevHover=hoverBtn==="revive";var revPulse=Math.sin(tick*0.1)*2;
    x.fillStyle="rgba(0,0,0,0.3)";rRect(btn.x+2,btn.y+3,btn.w,btn.h,10);x.fill();
    var revGrad=x.createLinearGradient(btn.x,btn.y,btn.x,btn.y+btn.h);
    if(isRevHover){revGrad.addColorStop(0,"#9b59b6");revGrad.addColorStop(1,"#6c3483");}else{revGrad.addColorStop(0,"#8e44ad");revGrad.addColorStop(1,"#5b2c6f");}
    rRect(btn.x-revPulse/2,btn.y-revPulse/2,btn.w+revPulse,btn.h+revPulse,10);x.fillStyle=revGrad;x.fill();x.strokeStyle="#4a235a";x.lineWidth=2;x.stroke();
    x.fillStyle="#fff";x.font="bold 18px Arial";x.textAlign="center";x.textBaseline="middle";x.fillText("💖 REVIVE ("+(3-reviveCount)+" left)",W/2,btn.y+btn.h/2);
    x.font="10px Arial";x.fillStyle="rgba(255,255,255,0.7)";x.fillText("Continue from here",W/2,btn.y+btn.h+12);
  }
  if(deadTick>25){var retryY=reviveCount<3?435:395;var a2=0.5+Math.sin(tick*0.07)*0.4;x.globalAlpha=a2*fadeIn;x.font="18px Arial";x.textAlign="center";x.strokeStyle="rgba(0,0,0,0.3)";x.lineWidth=2;x.fillStyle="#fff";x.strokeText("Tap to Retry",W/2,retryY);x.fillText("Tap to Retry",W/2,retryY);x.globalAlpha=1;}
  x.restore();x.globalAlpha=1;
}

function drawPauseUI(){x.fillStyle="rgba(0,0,0,0.5)";x.fillRect(0,0,W,H);x.font="bold 36px Arial";x.textAlign="center";x.fillStyle="#fff";x.lineWidth=3;x.strokeStyle="#000";x.strokeText("PAUSED",W/2,H/2-10);x.fillText("PAUSED",W/2,H/2-10);x.font="16px Arial";x.strokeText("Press P to resume",W/2,H/2+30);x.fillText("Press P to resume",W/2,H/2+30);}

function draw(){
  x.save();x.translate(shakeX,shakeY);
  drawSky();drawBgElements();drawHills();
  for(var i=0;i<pipes.length;i++)drawPipe(pipes[i]);
  drawGround();drawParticles();drawBird();drawFloats();drawScore();drawSpeedBar();
  if(state==="start"&&!settingsOpen)drawMenu();
  if(state==="dead")drawDead();
  if(flash>0){x.fillStyle="rgba(255,255,255,"+(flash/8*0.5)+")";x.fillRect(-10,-10,W+20,H+20);}
  x.restore();
  if(paused&&state==="play")drawPauseUI();
}

function loop(){update();draw();requestAnimationFrame(loop);}
init();loop();
</script>

<script>
// Create icons for PWA - simple canvas generated icons
(function createIcons() {
  function generateIcon(size) {
    const canvas = document.createElement('canvas');
    canvas.width = size;
    canvas.height = size;
    const ctx = canvas.getContext('2d');
    
    // Background gradient
    const grad = ctx.createLinearGradient(0, 0, size, size);
    grad.addColorStop(0, '#0a0f2a');
    grad.addColorStop(1, '#1a1f4a');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, size, size);
    
    // Draw feather/bird shape
    ctx.fillStyle = '#f8c53a';
    ctx.beginPath();
    ctx.ellipse(size/2, size/2, size*0.35, size*0.32, 0, 0, Math.PI*2);
    ctx.fill();
    ctx.fillStyle = '#e8a820';
    ctx.beginPath();
    ctx.ellipse(size*0.35, size*0.45, size*0.25, size*0.14, -0.2, 0, Math.PI*2);
    ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(size*0.65, size*0.4, size*0.12, 0, Math.PI*2);
    ctx.fill();
    ctx.fillStyle = '#222';
    ctx.beginPath();
    ctx.arc(size*0.68, size*0.38, size*0.06, 0, Math.PI*2);
    ctx.fill();
    ctx.fillStyle = '#f45c42';
    ctx.beginPath();
    ctx.moveTo(size*0.78, size*0.52);
    ctx.lineTo(size*0.95, size*0.58);
    ctx.lineTo(size*0.78, size*0.62);
    ctx.closePath();
    ctx.fill();
    
    // Border
    ctx.strokeStyle = '#00ffe7';
    ctx.lineWidth = size/40;
    ctx.strokeRect(size/20, size/20, size*0.9, size*0.9);
    
    return canvas.toDataURL();
  }
  
  // Store icons in localStorage for service worker to use
  const icons = {
    '192': generateIcon(192),
    '512': generateIcon(512)
  };
  window.__pwaIcons = icons;
})();
</script>
