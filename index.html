<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Feather Dash Pro</title>
<style>
*{margin:0;padding:0}
body{background:#1a1a2e;display:flex;justify-content:center;align-items:center;height:100vh;overflow:hidden}
canvas{cursor:pointer;border-radius:10px;box-shadow:0 0 40px rgba(0,0,0,0.5);display:block}
/* Social Bar Style Bottom Ad - Perfectly Fitted, Non-Intrusive */
.ad-bottom {
    position: fixed;
    bottom: 6px;
    left: 50%;
    transform: translateX(-50%);
    width: auto;
    max-width: 95vw;
    height: auto;
    z-index: 20;
    background: rgba(0,0,0,0.35);
    border-radius: 10px;
    padding: 4px 12px;
    backdrop-filter: blur(6px);
    font-size: 9px;
    text-align: center;
    color: rgba(255,255,255,0.5);
    pointer-events: auto;
    font-family: Arial, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 2px;
    border: 1px solid rgba(255,255,255,0.15);
}
.ad-bottom .ad-label {
    font-size: 8px;
    opacity: 0.4;
    letter-spacing: 1px;
    text-transform: uppercase;
}
.ad-bottom .ad-content {
    display: flex;
    justify-content: center;
    align-items: center;
    min-width: 320px;
    max-width: 728px;
}
.ad-bottom iframe, .ad-bottom ins {
    max-height: 65px !important;
    border-radius: 6px;
    margin: 0 auto;
}
@media (max-width: 550px) {
    .ad-bottom { display: none; }
}
</style>
</head>
<body>
<canvas id="g" width="400" height="600"></canvas>

<!-- Social Bar Style Bottom Banner Ad Container -->
<div id="adBottom" class="ad-bottom" style="display: none;">
    <div class="ad-label">✦ SPONSORED CONTENT ✦</div>
    <div class="ad-content" id="adBottomContent"></div>
</div>

<script>
// ====================== ORIGINAL GAME CODE (FULLY PRESERVED) ======================
var c=document.getElementById("g"),x=c.getContext("2d");

var W=400,H=600,GH=56,FLOOR=H-GH;
var BIRDX=75,BIRDR=12;

var clouds=[];
function makeClouds(){clouds=[];for(var i=0;i<6;i++){clouds.push({x:Math.random()*W*1.5,y:50+Math.random()*100,scale:0.5+Math.random()*0.6,speed:0.3+Math.random()*0.4});}}

var biomes=[
  {name:"Green Hills",skyTopDay:[77,201,246],skyBotDay:[197,232,247],skyTopNight:[15,15,60],skyBotNight:[40,30,80],groundTop:[222,216,149],groundBot:[180,170,120],grassTop:[91,163,27],grassBot:[140,196,62],pipeCol:["#5a9e2f","#73c740","#4a8a25","#3d7320"],bgType:"classic"},
  {name:"City",skyTopDay:[150,180,220],skyBotDay:[200,210,230],skyTopNight:[20,20,50],skyBotNight:[40,35,60],groundTop:[100,100,100],groundBot:[70,70,70],grassTop:[80,80,80],grassBot:[60,60,60],pipeCol:["#607d8b","#78909c","#546e7a","#455a64"],bgType:"city"},
  {name:"Forest",skyTopDay:[135,206,235],skyBotDay:[176,226,255],skyTopNight:[10,30,20],skyBotNight:[20,50,30],groundTop:[101,67,33],groundBot:[80,50,20],grassTop:[34,139,34],grassBot:[50,180,50],pipeCol:["#2d5016","#3d6b1e","#2d5016","#1e3a0f"],bgType:"forest"},
  {name:"Desert",skyTopDay:[135,180,255],skyBotDay:[200,220,255],skyTopNight:[40,30,60],skyBotNight:[60,40,80],groundTop:[210,180,140],groundBot:[194,158,100],grassTop:[218,165,32],grassBot:[184,134,11],pipeCol:["#8B4513","#A0522D","#8B4513","#654321"],bgType:"desert"},
  {name:"Beach",skyTopDay:[100,180,255],skyBotDay:[180,220,255],skyTopNight:[20,40,80],skyBotNight:[40,60,100],groundTop:[238,214,175],groundBot:[210,180,140],grassTop:[194,178,128],grassBot:[160,140,100],pipeCol:["#008B8B","#00CED1","#008B8B","#006666"],bgType:"beach"},
  {name:"Ocean",skyTopDay:[100,149,237],skyBotDay:[135,206,250],skyTopNight:[10,20,60],skyBotNight:[20,40,80],groundTop:[0,105,148],groundBot:[0,80,120],grassTop:[0,139,139],grassBot:[0,100,100],pipeCol:["#006994","#0099cc","#006994","#004466"],bgType:"ocean"},
  {name:"Snow Mountain",skyTopDay:[200,220,255],skyBotDay:[230,240,255],skyTopNight:[30,30,60],skyBotNight:[50,50,80],groundTop:[255,250,250],groundBot:[220,220,230],grassTop:[200,200,210],grassBot:[180,180,190],pipeCol:["#4682B4","#5F9EA0","#4682B4","#2F4F4F"],bgType:"snow"},
  {name:"Volcano",skyTopDay:[180,100,80],skyBotDay:[200,120,80],skyTopNight:[40,10,10],skyBotNight:[80,20,10],groundTop:[50,30,30],groundBot:[30,20,20],grassTop:[80,40,20],grassBot:[60,30,15],pipeCol:["#8B0000","#CD5C5C","#8B0000","#4B0000"],bgType:"volcano"},
  {name:"Candy Land",skyTopDay:[255,200,220],skyBotDay:[255,230,240],skyTopNight:[100,50,80],skyBotNight:[120,70,100],groundTop:[255,150,180],groundBot:[255,100,150],grassTop:[144,238,144],grassBot:[50,205,50],pipeCol:["#FF69B4","#FFB6C1","#FF69B4","#DB7093"],bgType:"candy"},
  {name:"Space",skyTopDay:[40,20,80],skyBotDay:[60,30,100],skyTopNight:[0,0,15],skyBotNight:[10,5,30],groundTop:[60,60,80],groundBot:[40,40,60],grassTop:[80,60,100],grassBot:[60,40,80],pipeCol:["#4B0082","#8A2BE2","#4B0082","#2E0854"],bgType:"space"},
  {name:"Cherry Blossom",skyTopDay:[255,200,220],skyBotDay:[255,230,240],skyTopNight:[80,40,60],skyBotNight:[100,50,80],groundTop:[139,90,43],groundBot:[100,60,30],grassTop:[144,238,144],grassBot:[100,180,100],pipeCol:["#8B4513","#A0522D","#8B4513","#654321"],bgType:"cherry"},
  {name:"Thunderstorm",skyTopDay:[80,80,100],skyBotDay:[100,100,120],skyTopNight:[20,20,35],skyBotNight:[40,40,55],groundTop:[60,70,60],groundBot:[40,50,40],grassTop:[50,80,50],grassBot:[30,60,30],pipeCol:["#2F4F4F","#3d6b6b","#2F4F4F","#1a3333"],bgType:"storm"}
];

var biomeChangePoints=[20,45,75,110,150,195,245,300,360,425,495];
var currentBiome=0,targetBiome=0,biomeBlend=0,bgElements=[];
var dayTime=0.1,daySpeed=0.00018;

var difficulties={
  easy:{name:"Easy",color:"#4CAF50",gravity:0.35,flap:-6.2,maxVel:8,baseGap:145,minGap:130,baseSpeed:1.8,maxSpeed:2.8,spawnBase:105,spawnMin:85,diffScale:60},
  normal:{name:"Normal",color:"#FF9800",gravity:0.4,flap:-6.6,maxVel:9,baseGap:130,minGap:115,baseSpeed:2.2,maxSpeed:3.5,spawnBase:95,spawnMin:75,diffScale:40},
  hard:{name:"Hard",color:"#f44336",gravity:0.45,flap:-7.0,maxVel:10,baseGap:115,minGap:100,baseSpeed:2.6,maxSpeed:4.2,spawnBase:85,spawnMin:65,diffScale:25}
};

var currentDiff="normal",diffSettings;
var bird,pipes,particles,floats,score,best,combo;
var state,tick,groundX,flash,shakeX,shakeY,shakeT;
var speed,pipeGap,spawnRate,difficulty,stars;
var paused=false,scoreAnim=0,deadTick=0,settingsOpen=false,hoverBtn="",lightning=0;
var reviveCount=0;

try{best=JSON.parse(localStorage.getItem("fb_best10"))||{easy:0,normal:0,hard:0};}catch(e){best={easy:0,normal:0,hard:0};}
function saveBest(){try{localStorage.setItem("fb_best10",JSON.stringify(best));}catch(e){}}

var AC=window.AudioContext||window.webkitAudioContext,ac;
function au(){if(!ac)ac=new AC();}
function sn(f,t,d,v){try{au();var o=ac.createOscillator(),g=ac.createGain();o.type=t;o.frequency.setValueAtTime(f,ac.currentTime);o.frequency.exponentialRampToValueAtTime(f*1.4,ac.currentTime+d*0.3);g.gain.setValueAtTime(v||0.1,ac.currentTime);g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+d);o.connect(g);g.connect(ac.destination);o.start();o.stop(ac.currentTime+d);}catch(e){}}
function sfxFlap(){sn(520,"sine",0.08,0.1);}
function sfxScore(){sn(880,"sine",0.12,0.08);setTimeout(function(){sn(1200,"sine",0.1,0.08);},60);}
function sfxCombo(){sn(1000,"sine",0.08,0.1);setTimeout(function(){sn(1400,"sine",0.08,0.1);},50);setTimeout(function(){sn(1700,"sine",0.1,0.1);},100);}
function sfxHit(){sn(180,"square",0.2,0.12);}
function sfxDie(){sn(100,"sawtooth",0.4,0.1);}
function sfxClick(){sn(700,"sine",0.05,0.08);}
function sfxStart(){sn(600,"sine",0.08,0.1);setTimeout(function(){sn(900,"sine",0.1,0.1);},60);}
function sfxRevive(){sn(400,"sine",0.1,0.1);setTimeout(function(){sn(600,"sine",0.1,0.1);},80);setTimeout(function(){sn(800,"sine",0.15,0.1);},160);}

function makeStars(){stars=[];for(var i=0;i<100;i++)stars.push({x:Math.random()*W,y:Math.random()*(FLOOR-50),s:0.5+Math.random()*2.5,b:Math.random(),tw:Math.random()*100});}
function makeBgElements(){bgElements=[];for(var i=0;i<15;i++){bgElements.push({x:i*50+Math.random()*30,type:Math.floor(Math.random()*5),h:30+Math.random()*50,w:20+Math.random()*35,biome:currentBiome});}}
function emit(px,py,n,col,sp){sp=sp||1;for(var i=0;i<n;i++)particles.push({x:px,y:py,vx:(Math.random()-0.5)*5*sp,vy:(Math.random()-0.5)*5*sp-2,life:16+Math.random()*14,max:30,sz:1.5+Math.random()*3,col:col,g:0.12});}
function addFloat(txt,px,py,col,sz){floats.push({t:txt,x:px,y:py,vy:-1.6,life:35,max:35,col:col||"#FFD700",sz:sz||20});}
function applyDifficulty(){diffSettings=difficulties[currentDiff];}

function init(){
  applyDifficulty();
  bird={y:250,vy:0,rot:0,fr:0,at:0,dead:false,wingPos:0};
  pipes=[];particles=[];floats=[];
  score=0;combo=0;tick=0;groundX=0;flash=0;
  shakeX=0;shakeY=0;shakeT=0;scoreAnim=0;deadTick=0;
  speed=diffSettings.baseSpeed;pipeGap=diffSettings.baseGap;spawnRate=diffSettings.spawnBase;
  difficulty=0;currentBiome=0;targetBiome=0;biomeBlend=0;
  dayTime=0.1;paused=false;state="menu";settingsOpen=false;lightning=0;
  reviveCount=0;
  if(!stars)makeStars();
  makeBgElements();makeClouds();
}

function startGame(){
  applyDifficulty();
  bird={y:250,vy:0,rot:0,fr:0,at:0,dead:false,wingPos:0};
  pipes=[];particles=[];floats=[];
  score=0;combo=0;tick=0;difficulty=0;
  currentBiome=0;targetBiome=0;biomeBlend=0;dayTime=0.1;
  speed=diffSettings.baseSpeed;pipeGap=diffSettings.baseGap;spawnRate=diffSettings.spawnBase;
  scoreAnim=0;deadTick=0;state="play";
  reviveCount=0;
  bird.vy=diffSettings.flap;
  sfxStart();sfxFlap();
  makeBgElements();makeClouds();
}

function doRevive(){
  if(reviveCount>=3)return;
  reviveCount++;
  bird.y=250;
  bird.vy=0;
  bird.rot=0;
  bird.dead=false;
  for(var i=pipes.length-1;i>=0;i--){
    if(pipes[i].x<BIRDX+120&&pipes[i].x>BIRDX-60){
      pipes.splice(i,1);
    }
  }
  combo=0;
  sfxRevive();
  emit(BIRDX,bird.y,15,"#00ff88",1.5);
  addFloat("REVIVED!",BIRDX+30,bird.y-40,"#00ff88",22);
  state="play";
  flash=5;
  deadTick=0;
}

function doFlap(){
  au();
  if(settingsOpen)return;
  if(state==="menu")return;
  if(state==="dead"){init();state="menu";return;}
  if(state==="play"&&!paused){
    bird.vy=diffSettings.flap;
    bird.at=0;
    sfxFlap();
    emit(BIRDX-6,bird.y+10,3,"rgba(255,255,255,0.6)");
  }
}

function getReviveBtnPos(){
  var pw=240,py=reviveCount<3?75:105;
  var revBtnW=180,revBtnH=45;
  var revBtnX=(W-revBtnW)/2,revBtnY=py+195;
  return{x:revBtnX,y:revBtnY,w:revBtnW,h:revBtnH};
}

function checkButtonClick(mx,my){
  var gearX=W-35,gearY=FLOOR-25;
  if(state==="menu"&&!settingsOpen){
    if(mx>gearX-20&&mx<gearX+20&&my>gearY-20&&my<gearY+20){settingsOpen=true;sfxClick();return true;}
    var btnW=160,btnH=50,btnX=(W-btnW)/2,btnY=330;
    if(mx>btnX&&mx<btnX+btnW&&my>btnY&&my<btnY+btnH){startGame();return true;}
  }
  if(settingsOpen){
    var pw=280,ph=260,px=(W-pw)/2,py=130;
    if(mx>px+pw-35&&mx<px+pw-10&&my>py+8&&my<py+32){settingsOpen=false;sfxClick();return true;}
    var btnY2=py+80,btnW2=220,btnH2=45,btnX2=(W-btnW2)/2;
    var diffs=["easy","normal","hard"];
    for(var i=0;i<3;i++){var by=btnY2+i*55;if(mx>btnX2&&mx<btnX2+btnW2&&my>by&&my<by+btnH2){currentDiff=diffs[i];applyDifficulty();sfxClick();return true;}}
    return true;
  }
  if(state==="dead"&&deadTick>20&&reviveCount<3){
    var btn=getReviveBtnPos();
    if(mx>btn.x&&mx<btn.x+btn.w&&my>btn.y&&my<btn.y+btn.h){
      doRevive();
      return true;
    }
  }
  return false;
}

c.onclick=function(e){var rect=c.getBoundingClientRect();var mx=(e.clientX-rect.left)*(W/rect.width);var my=(e.clientY-rect.top)*(H/rect.height);if(!checkButtonClick(mx,my))doFlap();};
c.onmousemove=function(e){var rect=c.getBoundingClientRect();var mx=(e.clientX-rect.left)*(W/rect.width);var my=(e.clientY-rect.top)*(H/rect.height);hoverBtn="";if(state==="menu"&&!settingsOpen){var btnW=160,btnH=50,btnX=(W-btnW)/2,btnY=330;if(mx>btnX&&mx<btnX+btnW&&my>btnY&&my<btnY+btnH)hoverBtn="start";}if(settingsOpen){var pw=280,ph=260,px=(W-pw)/2,py=130;var btnY2=py+80,btnW2=220,btnH2=45,btnX2=(W-btnW2)/2;var diffs=["easy","normal","hard"];for(var i=0;i<3;i++){var by=btnY2+i*55;if(mx>btnX2&&mx<btnX2+btnW2&&my>by&&my<by+btnH2)hoverBtn=diffs[i];}}if(state==="dead"&&deadTick>20&&reviveCount<3){var btn=getReviveBtnPos();if(mx>btn.x&&mx<btn.x+btn.w&&my>btn.y&&my<btn.y+btn.h)hoverBtn="revive";}};

document.onkeydown=function(e){
  if(e.code==="Space"||e.code==="ArrowUp"||e.code==="KeyW"){e.preventDefault();if(state==="menu"&&!settingsOpen){startGame();return;}if(!settingsOpen)doFlap();}
  if(e.code==="KeyP"&&state==="play"){paused=!paused;}
  if(e.code==="Escape"&&settingsOpen){settingsOpen=false;sfxClick();}
  if(e.code==="Enter"&&state==="menu"&&!settingsOpen){startGame();}
  if(e.code==="KeyR"&&state==="dead"&&reviveCount<3){doRevive();}
};

c.addEventListener("touchstart",function(e){e.preventDefault();var touch=e.touches[0];var rect=c.getBoundingClientRect();var mx=(touch.clientX-rect.left)*(W/rect.width);var my=(touch.clientY-rect.top)*(H/rect.height);if(!checkButtonClick(mx,my))doFlap();},{passive:false});

function getTargetBiome(sc){for(var i=biomeChangePoints.length-1;i>=0;i--){if(sc>=biomeChangePoints[i])return Math.min(i+1,biomes.length-1);}return 0;}

function updDiff(){
  difficulty=Math.min(score/diffSettings.diffScale,1);
  speed=diffSettings.baseSpeed+(diffSettings.maxSpeed-diffSettings.baseSpeed)*difficulty;
  pipeGap=diffSettings.baseGap-(diffSettings.baseGap-diffSettings.minGap)*difficulty*0.6;
  // FIX: Adjust spawn rate to ensure proper spacing between pipes - minimum distance between pipes
  var rawSpawn = diffSettings.spawnBase - (diffSettings.spawnBase - diffSettings.spawnMin) * difficulty;
  // Ensure spawnRate is not too low to cause overlapping pipes (minimum 75 frames between pipes)
  spawnRate = Math.max(75, Math.floor(rawSpawn));
  var newTarget=getTargetBiome(score);
  if(newTarget!==targetBiome)targetBiome=newTarget;
}

function addPipe(){
  var mn=70,mx=FLOOR-pipeGap-70,range=mx-mn;
  var top=mn+range*0.2+Math.random()*(range*0.6);
  var mvChance=currentDiff==="easy"?0.15:currentDiff==="normal"?0.25:0.35;
  var mvStart=currentDiff==="easy"?15:currentDiff==="normal"?12:8;
  var mv=(score>=mvStart&&Math.random()<mvChance)?((Math.random()-0.5)*(currentDiff==="hard"?1:0.7)):0;
  pipes.push({x:W+20,top:top,oTop:top,sc:false,mvy:mv,mt:Math.random()*100});
}

function update(){
  tick++;
  dayTime+=daySpeed;if(dayTime>=1)dayTime=0;
  
  for(var i=0;i<clouds.length;i++){clouds[i].x-=clouds[i].speed;if(clouds[i].x<-80){clouds[i].x=W+50+Math.random()*50;clouds[i].y=50+Math.random()*100;}}
  
  var stormActive=(currentBiome===11||targetBiome===11);
  if(lightning>0)lightning--;
  if(stormActive&&Math.random()<0.003)lightning=10;
  
  if(shakeT>0){shakeT--;shakeX=(Math.random()-0.5)*shakeT*0.7;shakeY=(Math.random()-0.5)*shakeT*0.7;}else{shakeX=0;shakeY=0;}
  if(flash>0)flash--;
  if(scoreAnim>0)scoreAnim--;

  for(var i=particles.length-1;i>=0;i--){var p=particles[i];p.x+=p.vx;p.y+=p.vy;p.vy+=p.g;p.vx*=0.97;p.life--;if(p.life<=0)particles.splice(i,1);}
  for(var i=floats.length-1;i>=0;i--){var f=floats[i];f.y+=f.vy;f.life--;if(f.life<=0)floats.splice(i,1);}

  if(state==="menu"){
    bird.y=250+Math.sin(tick*0.05)*14;
    bird.at+=0.12;bird.wingPos=Math.sin(tick*0.3)*0.5+0.5;
    bird.fr=Math.floor(bird.at)%3;
    bird.rot=0;
    bird.dead=false;
    return;
  }
  
  if(state==="fall"){
    bird.dead=true;
    bird.vy+=diffSettings.gravity*1.2;
    if(bird.vy>diffSettings.maxVel)bird.vy=diffSettings.maxVel;
    bird.y+=bird.vy;
    bird.rot=Math.min(bird.rot+4,75);
    if(bird.y>=FLOOR-BIRDR){
      bird.y=FLOOR-BIRDR;
      state="dead";sfxDie();deadTick=0;
      if(score>best[currentDiff]){best[currentDiff]=score;saveBest();}
    }
    return;
  }
  
  if(state==="dead"){bird.dead=true;deadTick++;return;}
  if(paused)return;

  if(currentBiome!==targetBiome){
    biomeBlend+=0.003;
    if(biomeBlend>=1){
      currentBiome=targetBiome;
      biomeBlend=0;
      for(var i=0;i<bgElements.length;i++){
        bgElements[i].biome=targetBiome;
      }
    }
  }
  groundX=(groundX-speed)%48;
  
  for(var i=0;i<bgElements.length;i++){
    bgElements[i].x-=speed*0.3;
    if(bgElements[i].x<-80){
      bgElements[i].x=W+50+Math.random()*80;
      bgElements[i].type=Math.floor(Math.random()*5);
      bgElements[i].h=30+Math.random()*50;
      bgElements[i].biome=targetBiome;
    }
  }

  bird.dead=false;
  bird.vy+=diffSettings.gravity;
  if(bird.vy>diffSettings.maxVel)bird.vy=diffSettings.maxVel;
  bird.y+=bird.vy;
  bird.at+=0.18;bird.wingPos=Math.sin(tick*0.5)*0.5+0.5;
  bird.fr=Math.floor(bird.at)%3;
  
  if(bird.vy < -2) bird.rot = -12;
  else if(bird.vy > 2) bird.rot = 18;
  else bird.rot = bird.vy * 3;

  // FIX: Proper pipe spacing - ensure minimum distance between pipes
  // Only add pipe if the last pipe is far enough away (minimum 130px gap between pipe edges)
  var canAddPipe = true;
  if(pipes.length > 0) {
    var lastPipe = pipes[pipes.length-1];
    // Check if last pipe is too close (less than 130 pixels away from right edge)
    if(lastPipe.x > W - 100) {
      canAddPipe = false;
    }
  }
  // Also use spawnRate timing but with additional spacing check
  if(tick % spawnRate === 0 && canAddPipe) {
    addPipe();
  }
  
  for(var i=pipes.length-1;i>=0;i--){
    var p=pipes[i];p.x-=speed;
    if(p.mvy!==0){p.mt+=0.03;p.top=p.oTop+Math.sin(p.mt)*22;}
    if(!p.sc&&p.x+54<BIRDX){
      p.sc=true;score++;combo++;updDiff();scoreAnim=12;
      if(combo>1&&combo%5===0){sfxCombo();addFloat("COMBO x"+combo+"!",BIRDX+20,bird.y-30,"#FF6B6B",18);emit(BIRDX,bird.y,8,"#FF6B6B",1.2);}
      else{sfxScore();addFloat("+1",BIRDX+25,bird.y-25,"#FFD700",16);}
      emit(BIRDX,bird.y-12,4,"#FFD700");
    }
    if(p.x<-64){pipes.splice(i,1);continue;}
    if(BIRDX+BIRDR-2>p.x&&BIRDX-BIRDR+2<p.x+54){
      if(bird.y-BIRDR+2<p.top||bird.y+BIRDR-2>p.top+pipeGap){
        sfxHit();flash=8;shakeT=10;combo=0;emit(BIRDX,bird.y,12,"#e74c3c",1.3);
        bird.dead=true;state="fall";return;
      }
    }
  }
  
  if(bird.y+BIRDR>=FLOOR){
    bird.y=FLOOR-BIRDR;sfxHit();flash=8;shakeT=6;combo=0;
    bird.dead=true;state="dead";sfxDie();deadTick=0;
    if(score>best[currentDiff]){best[currentDiff]=score;saveBest();}
  }

function lerpA(a,b,t){return[Math.round(a[0]+(b[0]-a[0])*t),Math.round(a[1]+(b[1]-a[1])*t),Math.round(a[2]+(b[2]-a[2])*t)];}
function rgb(a){return"rgb("+a[0]+","+a[1]+","+a[2]+")";}

function getSunPos(){
  if(dayTime>0.5){return{x:-100,y:200,visible:false,progress:0};}
  var sunProgress=dayTime/0.5;
  var sunX=-50+sunProgress*(W+100);
  var sunY=150-Math.sin(sunProgress*Math.PI)*110;
  return{x:sunX,y:sunY,visible:true,progress:sunProgress};
}

function getMoonPos(){
  if(dayTime<0.5)return{x:W+100,y:200,visible:false,progress:0};
  var moonProgress=(dayTime-0.5)/0.5;
  var moonX=W+30-moonProgress*(W+60);
  var moonY=130-Math.sin(moonProgress*Math.PI)*90;
  return{x:moonX,y:moonY,visible:true,progress:moonProgress};
}

function getDayNightT(){
  var sun=getSunPos();
  if(dayTime>=0.5)return 1;
  if(sun.x<20){
    var t=(sun.x+50)/70;
    return Math.max(0,1-t);
  }
  if(sun.x>=20&&sun.x<=W-20)return 0;
  if(sun.x>W-20){
    var t=(sun.x-(W-20))/70;
    return Math.min(1,t);
  }
  return 0;
}

function getSunColor(){
  var sun=getSunPos();
  if(!sun.visible)return{main:"#FFE066",glow:"rgba(255,224,102,0.3)"};
  var p=sun.progress;
  var r,g,b;
  if(p<0.08){var t=p/0.08;r=255;g=Math.round(255-t*10);b=Math.round(250-t*70);}
  else if(p<0.2){var t=(p-0.08)/0.12;r=255;g=Math.round(245-t*25);b=Math.round(180-t*70);}
  else if(p<0.5){r=255;g=220;b=100;}
  else if(p<0.7){var t=(p-0.5)/0.2;r=255;g=Math.round(220-t*80);b=Math.round(100-t*50);}
  else if(p<0.85){var t=(p-0.7)/0.15;r=255;g=Math.round(140-t*60);b=Math.round(50-t*25);}
  else{var t=(p-0.85)/0.15;r=255;g=Math.round(80-t*50);b=Math.round(25-t*15);}
  return{main:"rgb("+r+","+g+","+b+")",glow:"rgba("+r+","+g+","+b+",0.35)"};
}

function getBlendedColor(prop){
  var bio1=biomes[currentBiome],bio2=biomes[targetBiome];
  var dayT=getDayNightT();
  var col1Day=bio1[prop+"Day"]||bio1[prop],col1Night=bio1[prop+"Night"]||bio1[prop];
  var col1=lerpA(col1Day,col1Night,dayT);
  var col2Day=bio2[prop+"Day"]||bio2[prop],col2Night=bio2[prop+"Night"]||bio2[prop];
  var col2=lerpA(col2Day,col2Night,dayT);
  return lerpA(col1,col2,biomeBlend);
}

function getBlendedGroundColor(prop){
  var bio1=biomes[currentBiome],bio2=biomes[targetBiome];
  return lerpA(bio1[prop],bio2[prop],biomeBlend);
}

  rRect(btnX-pulse/2,btnY-pulse/2,btnW+pulse,btnH+pulse,12);
  x.fillStyle=btnGrad;x.fill();x.strokeStyle="#1b5e20";x.lineWidth=3;x.stroke();
  x.font="bold 24px Arial";x.textAlign="center";x.textBaseline="middle";x.fillStyle="#fff";
  x.shadowColor="rgba(0,0,0,0.3)";x.shadowBlur=4;x.shadowOffsetY=2;
  x.fillText("▶ START",W/2,btnY+btnH/2+1);x.shadowBlur=0;
  x.font="13px Arial";x.fillStyle="rgba(255,255,255,0.6)";
  x.fillText("or press SPACE",W/2,btnY+btnH+20);
  if(best[currentDiff]>0){x.font="16px Arial";x.fillStyle="#FFD700";x.fillText("Best: "+best[currentDiff],W/2,435);}
  var gearX=W-35,gearY=FLOOR-25;x.fillStyle="rgba(255,255,255,0.8)";drawGear(gearX,gearY,14);
  x.font="10px Arial";x.fillStyle="rgba(255,255,255,0.6)";x.fillText("Settings",gearX,gearY+25);
}

function drawSettings(){
  x.fillStyle="rgba(0,0,0,0.6)";x.fillRect(0,0,W,H);
  var pw=280,ph=260,px=(W-pw)/2,py=130;
  rRect(px,py,pw,ph,15);x.fillStyle="#f5e6c8";x.fill();x.strokeStyle="#8B7332";x.lineWidth=3;x.stroke();
  x.font="bold 24px Arial";x.textAlign="center";x.fillStyle="#5D4E37";x.fillText("⚙ Settings",W/2,py+32);
  x.fillStyle="#e74c3c";rRect(px+pw-35,py+8,25,25,5);x.fill();
  x.font="bold 16px Arial";x.fillStyle="#fff";x.fillText("✕",px+pw-22,py+26);
  x.font="bold 16px Arial";x.fillStyle="#5D4E37";x.fillText("Select Difficulty:",W/2,py+65);
  var btnY2=py+80,btnW2=220,btnH2=45,btnX2=(W-btnW2)/2;
  var diffs=["easy","normal","hard"],labels=["🌱 Easy","⭐ Normal","🔥 Hard"],descs=["Slower speed, bigger gaps","Balanced gameplay","Faster, smaller gaps"];
  for(var i=0;i<3;i++){
    var d=diffs[i],by=btnY2+i*55,isSelected=currentDiff===d,isHover2=hoverBtn===d;
    rRect(btnX2,by,btnW2,btnH2,10);
    if(isSelected){x.fillStyle=difficulties[d].color;x.fill();x.strokeStyle="#fff";x.lineWidth=3;x.stroke();}
    else{x.fillStyle=isHover2?"#e8d9b8":"#d9c9a8";x.fill();x.strokeStyle="#a89060";x.lineWidth=2;x.stroke();}
    x.font="bold 18px Arial";x.textAlign="center";x.fillStyle=isSelected?"#fff":"#5D4E37";x.fillText(labels[i],W/2,by+22);
    x.font="11px Arial";x.fillStyle=isSelected?"rgba(255,255,255,0.8)":"#888";x.fillText(descs[i],W/2,by+38);
    if(isSelected){x.fillStyle="#fff";x.font="bold 12px Arial";x.fillText("✓",btnX2+20,by+25);}
  }
}

function drawStar(sx,sy,ir,or,pts){x.beginPath();for(var i=0;i<pts*2;i++){var r=i%2===0?or:ir;var a=i*Math.PI/pts-Math.PI/2;if(i===0)x.moveTo(sx+r*Math.cos(a),sy+r*Math.sin(a));else x.lineTo(sx+r*Math.cos(a),sy+r*Math.sin(a));}x.closePath();x.fill();}

function drawDead(){
  var fadeIn=Math.min(1,deadTick/20);
  x.globalAlpha=fadeIn*0.4;x.fillStyle="#000";x.fillRect(0,0,W,FLOOR);x.globalAlpha=1;
  var slideY=Math.max(0,(1-Math.min(1,deadTick/15))*-40);
  x.save();x.translate(0,slideY);x.globalAlpha=fadeIn;
  var pw=240,ph=reviveCount<3?280:210,px=(W-pw)/2,py=reviveCount<3?75:105;
  rRect(px,py,pw,ph,12);x.fillStyle="#deb887";x.fill();x.strokeStyle="#8B7332";x.lineWidth=3;x.stroke();
  rRect(px+10,py+40,pw-20,ph-50,8);x.fillStyle="#c4a265";x.fill();
  x.font="bold 26px Arial";x.textAlign="center";x.fillStyle="#5D4E37";x.fillText("Game Over!",W/2,py+26);
  x.font="bold 11px Arial";x.fillStyle=diffSettings.color;x.fillText(diffSettings.name.toUpperCase(),W/2,py+42);
  x.font="12px Arial";x.fillStyle="#666";
  var reachedBiome=biomeBlend>0.5?biomes[targetBiome]:biomes[currentBiome];
  x.fillText("Reached: "+reachedBiome.name,W/2,py+60);
  x.font="14px Arial";x.fillStyle="#5D4E37";x.fillText("Score",W/2+30,py+88);
  x.font="bold 28px Arial";x.fillText(score,W/2+30,py+116);
  x.font="14px Arial";x.fillText("Best",W/2+30,py+143);
  x.font="bold 28px Arial";x.fillText(best[currentDiff],W/2+30,py+171);
  if(score===best[currentDiff]&&score>0){x.font="bold 11px Arial";x.fillStyle="#e74c3c";x.fillText("NEW!",W/2+70,py+143);}
  var medal=null,thresholds=currentDiff==="easy"?[50,40,25,15]:currentDiff==="normal"?[40,30,20,10]:[30,20,12,6];
  if(score>=thresholds[0])medal={c:"#e5c100",b:"#b8960a",n:"Platinum"};
  else if(score>=thresholds[1])medal={c:"#FFD700",b:"#DAA520",n:"Gold"};
  else if(score>=thresholds[2])medal={c:"#C0C0C0",b:"#A0A0A0",n:"Silver"};
  else if(score>=thresholds[3])medal={c:"#CD7F32",b:"#A0522D",n:"Bronze"};
  if(medal){var mx=px+45,my=py+125;var glow=0.2+Math.sin(deadTick*0.08)*0.15;x.fillStyle="rgba(255,215,0,"+glow+")";x.beginPath();x.arc(mx,my,28,0,Math.PI*2);x.fill();x.beginPath();x.arc(mx,my,22,0,Math.PI*2);x.fillStyle=medal.c;x.fill();x.strokeStyle=medal.b;x.lineWidth=2;x.stroke();x.fillStyle="#fff";drawStar(mx,my,7,13,5);x.font="9px Arial";x.fillStyle="#5D4E37";x.fillText(medal.n,mx,my+33);}
  
  if(reviveCount<3&&deadTick>20){
    var btn=getReviveBtnPos();
    var isRevHover=hoverBtn==="revive";
    var revPulse=Math.sin(tick*0.1)*2;
    x.fillStyle="rgba(0,0,0,0.3)";
    rRect(btn.x+2,btn.y+3,btn.w,btn.h,10);x.fill();
    var revGrad=x.createLinearGradient(btn.x,btn.y,btn.x,btn.y+btn.h);
    if(isRevHover){revGrad.addColorStop(0,"#9b59b6");revGrad.addColorStop(1,"#6c3483");}
    else{revGrad.addColorStop(0,"#8e44ad");revGrad.addColorStop(1,"#5b2c6f");}
    rRect(btn.x-revPulse/2,btn.y-revPulse/2,btn.w+revPulse,btn.h+revPulse,10);
    x.fillStyle=revGrad;x.fill();
    x.strokeStyle="#4a235a";x.lineWidth=2;x.stroke();
    x.fillStyle="#fff";
    x.font="bold 18px Arial";
    x.textAlign="center";
    x.textBaseline="middle";
    x.fillText("💖 REVIVE ("+(3-reviveCount)+" left)",W/2,btn.y+btn.h/2);
    x.font="10px Arial";
    x.fillStyle="rgba(255,255,255,0.7)";
    x.fillText("Continue from here",W/2,btn.y+btn.h+12);
  }

  if(deadTick>25){
    var retryY=reviveCount<3?435:395;
    var a2=0.5+Math.sin(tick*0.07)*0.4;
    x.globalAlpha=a2*fadeIn;
    x.font="18px Arial";
    x.textAlign="center";
    x.strokeStyle="rgba(0,0,0,0.3)";
    x.lineWidth=2;
    x.fillStyle="#fff";
    x.strokeText("Tap to Retry",W/2,retryY);
    x.fillText("Tap to Retry",W/2,retryY);
    x.globalAlpha=1;
  }

  x.restore();x.globalAlpha=1;
}

function drawPause(){x.fillStyle="rgba(0,0,0,0.5)";x.fillRect(0,0,W,H);x.font="bold 36px Arial";x.textAlign="center";x.fillStyle="#fff";x.lineWidth=3;x.strokeStyle="#000";x.strokeText("PAUSED",W/2,H/2-10);x.fillText("PAUSED",W/2,H/2-10);x.font="16px Arial";x.strokeText("Press P to resume",W/2,H/2+30);x.fillText("Press P to resume",W/2,H/2+30);}

function draw(){
  x.save();x.translate(shakeX,shakeY);
  drawSky();drawBgElements();drawHills();
  for(var i=0;i<pipes.length;i++)drawPipe(pipes[i]);
  drawGround();drawParticles();drawBird();drawFloats();drawScore();drawSpeedBar();
  if(state==="menu"&&!settingsOpen)drawMenu();
  if(state==="dead")drawDead();
  if(flash>0){x.fillStyle="rgba(255,255,255,"+(flash/8*0.5)+")";x.fillRect(-10,-10,W+20,H+20);}
  x.restore();
  if(paused&&state==="play")drawPause();
  if(settingsOpen)drawSettings();
}

function loop(){update();draw();requestAnimationFrame(loop);}
init();loop();
